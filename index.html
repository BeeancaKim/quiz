    function App() {

      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);

      const [userInput, setUserInput] = useState("");

      const [isFlipped, setIsFlipped] = useState(false);
      const [dragStartX, setDragStartX] = useState(null);
      const [dragX, setDragX] = useState(0);
      const [flashcardStats, setFlashcardStats] = useState({ known: 0, unknown: 0 });

      // 로컬 스토리지 데이터 불러오기
      useEffect(() => {
        try {
          const saved = localStorage.getItem('hanjaBookmarks');
          if (saved) {
            setBookmarks(JSON.parse(saved));
          }
        } catch(e) {
          console.warn("저장된 단어장 불러오기 실패:", e);
        }
      }, []);

      // 로컬 스토리지 동기화 및 북마크 업데이트
      const toggleBookmark = (wordStr, add) => {
        setBookmarks(prev => {
          let newBookmarks;
          if (add) {
            newBookmarks = prev.includes(wordStr) ? prev : [...prev, wordStr];
          } else {
            newBookmarks = prev.filter(w => w !== wordStr);
          }
          try {
            localStorage.setItem('hanjaBookmarks', JSON.stringify(newBookmarks));
          } catch(e) {
            console.warn("단어장 저장 실패:", e);
          }
          return newBookmarks;
        });
      };

      const startFlashcard = (mode, limit) => {
        let deck = [];
        if (mode === 'all') {
          deck = [...wordData]; 
        } else if (mode === 'random') {
          deck = [...wordData].sort(() => 0.5 - Math.random()); 
          if (limit) deck = deck.slice(0, limit); 
        } else if (mode === 'bookmarks') {
          deck = wordData.filter(item => bookmarks.includes(item.word)); 
          if (deck.length === 0) {
            alert("저장된 오답(즐겨찾기) 단어가 없습니다!");
            return;
          }
        }
        setFlashcardDeck(deck);
        setCurrentIndex(0);
        setIsFlipped(false);
        setFlashcardStats({ known: 0, unknown: 0 });
        setCurrentView('flashcard');
      };

      const handleDragStart = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        setDragStartX(clientX);
      };

      const handleDragMove = (e) => {
        if (dragStartX === null) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        setDragX(clientX - dragStartX);
      };

      const handleDragEnd = () => {
        if (dragStartX === null) return;
        if (dragX > 100) {
          handleSwipe('right'); 
        } else if (dragX < -100) {
          handleSwipe('left');  
        } else if (Math.abs(dragX) < 10) {
          setIsFlipped(!isFlipped); 
        }
        setDragStartX(null);
        setDragX(0);
      };

      const handleSwipe = (direction) => {
        const currentWord = flashcardDeck[currentIndex].word;
        if (direction === 'left') {
          toggleBookmark(currentWord, true);
          setFlashcardStats(prev => ({ ...prev, unknown: prev.unknown + 1 }));
        } else {
          toggleBookmark(currentWord, false);
          setFlashcardStats(prev => ({ ...prev, known: prev.known + 1 }));
        }
        setTimeout(() => {
          if (currentIndex + 1 >= flashcardDeck.length) {
            setCurrentView('result'); 
          } else {
            setCurrentIndex(prev => prev + 1);
            setIsFlipped(false);
          }
        }, 150); 
      };

      const startQuiz = (type, limit) => {
        let questions = [];
        const shuffledData = [...wordData].sort(() => 0.5 - Math.random());
        const selectedData = limit === 'all' ? shuffledData : shuffledData.slice(0, limit);

        selectedData.forEach(item => {
          let qType = type;
          if (type === 'mix') {
            const r = Math.random();
            if (r < 0.4) qType = '1';
            else if (r < 0.7) qType = '2B';
            else qType = '2C';
          }

          if (qType === '1') {
            questions.push({ ...item, qType: '1', questionText: item.meaning, expectedAnswer: item.word });
          } else if (qType === '2B') {
            questions.push({ ...item, qType: '2B', questionText: item.word, subText: item.blankQuestion, expectedAnswer: item.blankAnswer });
          } else if (qType === '2C') {
            questions.push({ ...item, qType: '2C', questionText: item.word, expectedAnswer: item.meaning });
          }
        });

        setQuizQuestions(questions);
        setCurrentIndex(0);
        setScore(0);
        setUserInput("");
        setFeedback(null);
        setShowSelfGrade(false);
        setIncorrectList([]);
        setCurrentView('quiz');
      };

      const handleSubmit = (e) => {
        if (e) e.preventDefault();
        if (!userInput.trim()) return;

        const currentQ = quizQuestions[currentIndex];
        if (currentQ.qType === '2C') {
          setShowSelfGrade(true);
          return;
        }

        const isCorrect = userInput.replace(/\s+/g, '') === currentQ.expectedAnswer.replace(/\s+/g, '');
        if (isCorrect) {
          setScore(prev => prev + 1);
          setFeedback({ isCorrect: true, showHint: false });
          // 맞히면 오답 노트에서 자동 삭제
          toggleBookmark(currentQ.word, false); 
          setTimeout(nextQuestion, 1000); 
        } else {
          setFeedback({ isCorrect: false, showHint: true, userAns: userInput });
          // 틀린 문제는 무조건 오답 노트에 추가
          toggleBookmark(currentQ.word, true); 
        }
      };

      const handleWrongNext = () => {
        const currentQ = quizQuestions[currentIndex];
        setIncorrectList(prev => [...prev, { ...currentQ, userAnswer: feedback.userAns }]);
        nextQuestion();
      };

      const handleOverride = (isCorrect) => {
        const currentQ = quizQuestions[currentIndex];
        if (isCorrect) {
          setScore(prev => prev + 1);
          toggleBookmark(currentQ.word, false); 
        } else {
          setIncorrectList(prev => [...prev, { ...currentQ, userAnswer: userInput }]);
          toggleBookmark(currentQ.word, true); 
        }
        setShowSelfGrade(false);
        nextQuestion();
      };

      const handleAbort = () => {
        const remaining = quizQuestions.slice(currentIndex);
        const abortedItems = remaining.map(q => ({ ...q, userAnswer: '중도 포기' }));
        setIncorrectList(prev => [...prev, ...abortedItems]);
        
        const wordsToAdd = abortedItems.map(item => item.word);
        setBookmarks(prev => {
          const newB = [...prev];
          wordsToAdd.forEach(w => {
            if (!newB.includes(w)) newB.push(w);
          });
          try {
            localStorage.setItem('hanjaBookmarks', JSON.stringify(newB));
          } catch(e) {
            console.warn("단어장 저장 실패:", e);
          }
          return newB;
        });

        setCurrentView('result');
      };

      const nextQuestion = () => {
        if (currentIndex + 1 >= quizQuestions.length) {
          setCurrentView('result');
        } else {
          setCurrentIndex(prev => prev + 1);
          setUserInput("");
          setFeedback(null);
          setShowSelfGrade(false);
        }
      };

      const renderMenu = () => (
        <div className="max-w-3xl mx-auto p-4 sm:p-6 mt-4 sm:mt-10">
          <div className="text-center mb-8">
            <h1 className="text-2xl sm:text-3xl font-black text-gray-800 flex items-center justify-center gap-2 tracking-tight">
              📖 과천외고 한자성어 마스터
            </h1>
          </div>

          <div className="space-y-6">
            <div className="bg-gradient-to-br from-emerald-50 to-teal-50 p-5 rounded-2xl border border-emerald-100 shadow-sm">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg sm:text-xl font-bold text-teal-900 flex items-center gap-2">
                  📚 스마트 암기장 (플래시카드)
                </h2>
                <div className="text-xs bg-teal-100 text-teal-800 px-3 py-1 rounded-full font-bold flex items-center gap-1">
                  ⭐ 내 오답: {bookmarks.length}개
                </div>
              </div>
              <p className="text-teal-700 text-sm mb-4 bg-white/50 p-3 rounded-lg border border-teal-100">
                👉 <b>오른쪽</b>으로 넘기면 <b>'아는 단어'</b> (오답 노트 제외)<br/>
                👈 <b>왼쪽</b>으로 넘기면 <b>'모르는 단어'</b> (오답 노트 저장)
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <button onClick={() => startFlashcard('all')} className="py-3 bg-white hover:bg-teal-50 text-teal-700 rounded-xl font-bold border border-teal-200 shadow-sm transition">
                  전체 암기
                </button>
                <button onClick={() => startFlashcard('random', 70)} className="py-3 bg-white hover:bg-teal-50 text-teal-700 rounded-xl font-bold border border-teal-200 shadow-sm transition">
                  랜덤 암기(70제)
                </button>
                <button onClick={() => startFlashcard('bookmarks')} className="py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-bold shadow-md transition relative overflow-hidden group">
                  <span className="relative z-10">오답만 암기</span>
                  {bookmarks.length > 0 && <span className="absolute top-0 right-0 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-bl-lg font-bold">{bookmarks.length}</span>}
                </button>
              </div>
            </div>

            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
              <h2 className="text-lg sm:text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                🎯 지필고사 실전 훈련
              </h2>
              <div className="space-y-3">
                <div className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                  <div className="text-sm"><b>유형 1.</b> 뜻 보고 성어 쓰기</div>
                  <div className="flex gap-2">
                    <button onClick={() => startQuiz('1', 50)} className="px-3 py-1.5 bg-gray-200 text-gray-700 rounded text-xs font-bold hover:bg-gray-300">50제</button>
                    <button onClick={() => startQuiz('1', 'all')} className="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded text-xs font-bold hover:bg-indigo-200">전체</button>
                  </div>
                </div>
                <div className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                  <div className="text-sm"><b>유형 2-A.</b> 빈칸 채우기</div>
                  <div className="flex gap-2">
                    <button onClick={() => startQuiz('2B', 50)} className="px-3 py-1.5 bg-gray-200 text-gray-700 rounded text-xs font-bold hover:bg-gray-300">50제</button>
                    <button onClick={() => startQuiz('2B', 'all')} className="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded text-xs font-bold hover:bg-indigo-200">전체</button>
                  </div>
                </div>
                <div className="flex justify-between items-center bg-orange-50 p-3 rounded-lg border border-orange-100">
                  <div className="text-sm text-orange-900"><b>유형 2-B.</b> 실전 전체 서술</div>
                  <div className="flex gap-2">
                    <button onClick={() => startQuiz('2C', 50)} className="px-3 py-1.5 bg-orange-200 text-orange-800 rounded text-xs font-bold hover:bg-orange-300">50제</button>
                    <button onClick={() => startQuiz('2C', 'all')} className="px-3 py-1.5 bg-orange-500 text-white rounded text-xs font-bold hover:bg-orange-600">전체</button>
                  </div>
                </div>
              </div>
              
              <button 
                onClick={() => startQuiz('mix', 30)}
                className="w-full mt-4 py-4 bg-gray-900 hover:bg-black text-white rounded-xl font-bold shadow-md transition flex justify-center items-center gap-2">
                실전 모의고사 (랜덤 30문제 혼합) ▶️
              </button>
            </div>
          </div>
        </div>
      );

      const renderFlashcard = () => {
        const currentCard = flashcardDeck[currentIndex];
        const rotate = dragX * 0.05; 
        const opacity = 1 - Math.abs(dragX) / 500;
        const isDragging = dragStartX !== null;
        
        let cardBg = "bg-white";
        if (dragX > 50) cardBg = "bg-green-50 border-green-300";
        else if (dragX < -50) cardBg = "bg-red-50 border-red-300";

        return (
          <div className="min-h-[80vh] flex flex-col max-w-md mx-auto p-4 relative overflow-hidden touch-none">
            <div className="flex justify-between items-center mb-6 text-sm font-bold text-gray-400">
              <button onClick={() => setCurrentView('menu')} className="text-gray-400 hover:text-gray-800 flex items-center">🚪 종료</button>
              <span>{currentIndex + 1} / {flashcardDeck.length}</span>
            </div>

            <div className="absolute inset-0 flex items-center justify-between px-8 z-0 pointer-events-none opacity-50">
              <div className={`flex flex-col items-center ${dragX < -20 ? 'text-red-500 scale-110' : 'text-gray-300'} transition-transform`}>
                <span className="text-4xl">⬅️</span>
                <span className="font-black mt-2">모름 (저장)</span>
              </div>
              <div className={`flex flex-col items-center ${dragX > 20 ? 'text-green-500 scale-110' : 'text-gray-300'} transition-transform`}>
                <span className="text-4xl">➡️</span>
                <span className="font-black mt-2">알음 (제외)</span>
              </div>
            </div>

            <div className="flex-1 flex items-center justify-center z-10 perspective-1000">
              <div 
                className={`w-full aspect-[3/4] rounded-3xl shadow-2xl border-2 ${isDragging ? 'cursor-grabbing transition-none' : 'cursor-pointer transition-transform duration-300 ease-out'} ${cardBg} flex items-center justify-center p-6 select-none relative transform-style-3d`}
                style={{ 
                  transform: `translateX(${dragX}px) rotate(${rotate}deg) rotateY(${isFlipped ? 180 : 0}deg)`,
                  opacity: isDragging ? opacity : 1
                }}
                onMouseDown={handleDragStart}
                onMouseMove={handleDragMove}
                onMouseUp={handleDragEnd}
                onMouseLeave={handleDragEnd}
                onTouchStart={handleDragStart}
                onTouchMove={handleDragMove}
                onTouchEnd={handleDragEnd}
              >
                {/* [버그 수정 완료] pointer-events-none 추가하여 클릭 간섭 제거 */}
                <div className={`absolute inset-0 w-full h-full flex flex-col items-center justify-center p-8 text-center backface-hidden pointer-events-none ${isFlipped ? 'opacity-0' : 'opacity-100'}`} style={{ transform: 'rotateY(0deg)', backfaceVisibility: 'hidden' }}>
                  <div className="mb-4 text-indigo-200 text-4xl animate-bounce">👆</div>
                  <h2 className="text-5xl font-black text-gray-800 tracking-widest mb-4">{currentCard.word}</h2>
                  <p className="text-2xl text-gray-400 tracking-[0.5em]">{currentCard.hanja}</p>
                  <p className="absolute bottom-6 text-xs text-gray-300 font-bold">터치하여 뜻 확인 / 좌우로 밀어 넘기기</p>
                </div>

                <div className={`absolute inset-0 w-full h-full flex flex-col items-center justify-center p-6 text-center backface-hidden pointer-events-none ${isFlipped ? 'opacity-100' : 'opacity-0'}`} style={{ transform: 'rotateY(180deg)', backfaceVisibility: 'hidden' }}>
                  <h3 className="text-xl font-bold text-indigo-900 mb-2">{currentCard.word}</h3>
                  <p className="text-lg text-gray-700 leading-relaxed mb-6 font-medium break-keep">
                    "{currentCard.meaning}"
                  </p>
                  <div className="w-full bg-white/60 p-4 rounded-xl border border-indigo-50">
                    <p className="text-xs font-bold text-indigo-400 mb-1">💡 한자 힌트</p>
                    <p className="text-sm text-gray-600">{currentCard.hint}</p>
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-8 flex gap-4 z-10">
              <button onClick={() => { setDragX(-200); setTimeout(() => handleSwipe('left'), 50); }} className="flex-1 py-4 bg-white border-2 border-red-100 text-red-500 rounded-2xl font-black shadow-sm flex justify-center items-center gap-2 hover:bg-red-50">
                ❌ 모름
              </button>
              <button onClick={() => { setDragX(200); setTimeout(() => handleSwipe('right'), 50); }} className="flex-1 py-4 bg-white border-2 border-green-100 text-green-500 rounded-2xl font-black shadow-sm flex justify-center items-center gap-2 hover:bg-green-50">
                ✅ 앎
              </button>
            </div>
          </div>
        );
      };

      const renderQuiz = () => {
        const currentQ = quizQuestions[currentIndex];
        return (
          <div className="max-w-2xl mx-auto p-4 sm:p-6 bg-white rounded-2xl shadow-xl mt-4 sm:mt-10">
            <div className="flex justify-between items-end mb-2">
              <div className="text-sm font-bold text-gray-500">
                문제 {currentIndex + 1} / {quizQuestions.length} <span className="ml-2 text-indigo-500">(점수: {score})</span>
              </div>
              <button onClick={handleAbort} className="text-xs flex items-center gap-1 text-gray-400 hover:text-red-500 transition">
                🚪 중단/채점
              </button>
            </div>
            
            <div className="w-full bg-gray-200 rounded-full h-2 mb-8">
              <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentIndex) / quizQuestions.length) * 100}%` }}></div>
            </div>

            <div className="text-center mb-8">
              <div className="inline-block px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold mb-4">
                {currentQ.qType === '1' && "유형 1: 뜻 보고 성어 쓰기"}
                {currentQ.qType === '2B' && "유형 2-A: 빈칸 단답형"}
                {currentQ.qType === '2C' && "유형 2-B: 실전 서술형"}
              </div>
              
              {currentQ.qType === '1' ? (
                <h2 className="text-xl sm:text-2xl font-bold text-gray-800 leading-relaxed break-keep">
                  "{currentQ.questionText}"
                </h2>
              ) : (
                <>
                  <h2 className="text-3xl sm:text-4xl font-black text-indigo-900 tracking-widest mb-2">{currentQ.questionText}</h2>
                  <p className="text-lg text-gray-400 mb-4 tracking-widest">({currentQ.hanja})</p>
                  {currentQ.qType === '2B' && (
                    <div className="bg-blue-50 p-4 rounded-lg text-lg font-medium text-gray-800 leading-relaxed break-keep">
                      {currentQ.subText}
                    </div>
                  )}
                  {currentQ.qType === '2C' && (
                    <div className="text-gray-500 mb-4 text-sm">
                      위 한자성어의 뜻풀이를 완성된 문장으로 서술하세요.
                    </div>
                  )}
                </>
              )}
            </div>

            {!showSelfGrade ? (
              <form onSubmit={handleSubmit} className="space-y-4">
                <input 
                  type="text" 
                  autoFocus
                  className="w-full p-4 border-2 border-gray-300 rounded-xl text-lg text-center focus:border-indigo-500 focus:outline-none transition shadow-sm"
                  placeholder={currentQ.qType === '2C' ? "뜻풀이를 자세히 적어보세요" : "정답을 입력하세요"}
                  value={userInput}
                  onChange={(e) => setUserInput(e.target.value)}
                  disabled={feedback?.isCorrect}
                />
                
                {!feedback && (
                  <button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition">
                    {currentQ.qType === '2C' ? "제출하고 정답 확인하기" : "정답 확인"}
                  </button>
                )}
              </form>
            ) : (
              <div className="space-y-6 animate-fade-in">
                <div className="p-4 border-2 border-orange-200 bg-orange-50 rounded-xl">
                  <h4 className="text-xs font-bold text-orange-500 mb-1">내 답변</h4>
                  <p className="text-lg font-medium text-gray-800">{userInput}</p>
                </div>
                <div className="p-4 border-2 border-green-200 bg-green-50 rounded-xl shadow-inner">
                  <h4 className="text-xs font-bold text-green-600 mb-1">실제 정답</h4>
                  <p className="text-lg font-bold text-green-900 leading-relaxed">{currentQ.expectedAnswer}</p>
                </div>
                
                <div className="pt-4 border-t border-gray-200">
                  <p className="text-center font-bold text-gray-600 mb-4">의미가 일치합니까?</p>
                  <div className="flex gap-4">
                    <button onClick={() => handleOverride(false)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition flex justify-center items-center gap-2">
                      ❌ 아쉽지만 틀림
                    </button>
                    <button onClick={() => handleOverride(true)} className="flex-1 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-md transition flex justify-center items-center gap-2">
                      ✅ 정답으로 인정
                    </button>
                  </div>
                </div>
              </div>
            )}

            {feedback && !feedback.isCorrect && !showSelfGrade && (
              <div className="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl animate-fade-in">
                <h3 className="text-red-600 font-bold flex items-center gap-2 mb-2">
                  🚨 오답입니다! (자동 즐겨찾기 됨)
                </h3>
                <p className="text-gray-800 mb-4 text-lg">
                  정답은 <span className="font-bold text-red-600 bg-red-100 px-2 py-1 rounded">'{currentQ.expectedAnswer}'</span>
                </p>
                <div className="bg-white p-4 rounded-lg border border-red-100 mb-4">
                  <h4 className="text-xs font-bold text-indigo-400 mb-1">💡 외우기 힌트</h4>
                  <p className="text-sm text-gray-700 leading-relaxed">{currentQ.hint}</p>
                </div>
                <button onClick={handleWrongNext} className="w-full py-4 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition">
                  다음 문제로 넘어가기
                </button>
              </div>
            )}

            {feedback && feedback.isCorrect && (
              <div className="mt-6 p-4 bg-green-100 text-green-800 rounded-xl text-center font-bold flex flex-col items-center justify-center gap-2 animate-bounce">
                ✅ 정답입니다! 
              </div>
            )}
          </div>
        );
      };

      const renderResult = () => {
        const isFlashcardResult = flashcardDeck.length > 0 && quizQuestions.length === 0;
        return (
          <div className="max-w-3xl mx-auto p-6 sm:p-8 bg-white rounded-2xl shadow-xl mt-4 sm:mt-10">
            <div className="text-center mb-8">
              <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">
                ✅
              </div>
              <h2 className="text-2xl sm:text-3xl font-black text-gray-800 mb-2">학습 완료!</h2>
              
              {isFlashcardResult ? (
                <div className="text-gray-600">
                  <p>플래시카드 암기가 끝났습니다.</p>
                  <div className="flex justify-center gap-4 mt-4">
                    <div className="px-4 py-2 bg-green-50 text-green-700 rounded-lg font-bold">아는 단어: {flashcardStats.known}</div>
                    <div className="px-4 py-2 bg-red-50 text-red-700 rounded-lg font-bold">모르는 단어: {flashcardStats.unknown}</div>
                  </div>
                </div>
              ) : (
                <>
                  <p className="text-gray-500 mb-4">총 {quizQuestions.length}문제 중 아래 점수를 기록했습니다.</p>
                  <div className="text-6xl font-black text-indigo-600 mb-6">
                    {score} <span className="text-2xl text-gray-400">/ {quizQuestions.length}</span>
                  </div>
                </>
              )}
            </div>

            {!isFlashcardResult && incorrectList.length > 0 && (
              <div className="mb-8 border-t pt-6">
                <h3 className="text-lg font-bold text-red-600 mb-4 flex items-center gap-2">
                  🚨 틀린 문제 복습 (자동으로 암기장에 추가됨)
                </h3>
                <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                  {incorrectList.map((item, idx) => (
                    <div key={idx} className="p-3 bg-gray-50 border border-gray-200 rounded-lg">
                      <div className="flex justify-between items-start mb-1">
                        <h4 className="font-bold text-gray-800">
                          {item.word} <span className="text-xs font-normal text-gray-500">({item.hanja})</span>
                        </h4>
                      </div>
                      <p className="text-sm text-gray-700 bg-white p-2 rounded border border-gray-100">
                        <span className="font-bold text-indigo-600 mr-2">[정답]</span>{item.expectedAnswer}
                      </p>
                      <p className="text-xs text-gray-500 mt-1">
                        <span className="font-bold text-red-400 mr-2">[내 답변]</span><span className="line-through">{item.userAnswer || "입력 안함"}</span>
                      </p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <button 
              onClick={() => {
                setQuizQuestions([]);
                setFlashcardDeck([]);
                setCurrentView('menu');
              }}
              className="w-full py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-bold shadow-md transition flex justify-center items-center gap-2">
              🔄 메인 메뉴로 돌아가기
            </button>
          </div>
        );
      };

      return (
        <div className="min-h-screen">
          {currentView === 'menu' && renderMenu()}
          {currentView === 'quiz' && renderQuiz()}
          {currentView === 'flashcard' && renderFlashcard()}
          {currentView === 'result' && renderResult()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
